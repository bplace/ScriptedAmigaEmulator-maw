<!DOCTYPE html>
<html lang="en-us">
	<head>
		<title>SAE - one-click launcher</title>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<link rel="icon" type="image/x-icon" href="favicon.ico" />
		<link rel="stylesheet" type="text/css" href="example.css" />

		<!-- Whole emulator in one file. Rebuild with `make` after editing sae/*.js -->
		<script type="text/javascript" src="scriptedamigaemulator.js"></script>

		<!-- Launcher -->
		<script type="text/javascript" src="run.js"></script>
	</head>

	<body onload="init()">
		<noscript>
			<div style="height:20px"></div>
			<div class="noscript">JavaScript is disabled or not supported!</div>
			<div style="height:20px"></div>
		</noscript>
		<div style="text-align:center">
			<div style="height:10px"></div>

			<table style="margin:auto">
				<tr>
					<td class="arm">ROM</td>
					<td class="alm">
						<select id="cfg_rom"></select>
					</td>
				</tr>
				<tr>
					<td class="arm">Model</td>
					<td class="alm">
						<select id="cfg_model">
							<option value="A500" selected>A500 (OCS)</option>
							<option value="A500P">A500 Plus (ECS)</option>
							<option value="A600">A600 (ECS)</option>
							<option value="A1200">A1200 (AGA)</option>
							<option value="A2000">A2000 (OCS)</option>
						</select>
					</td>
				</tr>
				<tr>
					<td class="arm">Controls</td>
					<td class="alm">
						<table>
							<tr>
								<td><button id="btnStart" onclick="start()" disabled>Start</button></td>
								<td><button onclick="stop()">Stop</button></td>
								<td><button onclick="reset()">Reset</button></td>
							</tr>
						</table>
					</td>
				</tr>
				<tr>
					<td class="arm">Log</td>
					<td class="alm">
						<pre id="log" style="width:520px;height:96px;overflow:auto;margin:0;text-align:left;background:#111;color:#8C8;padding:4px;font:11px monospace"></pre>
					</td>
				</tr>
				<tr>
					<td class="arm">Output</td>
					<td class="alm">
						<div id="myVideo" style="margin:auto"></div>
					</td>
				</tr>
			</table>
		</div>
	</body>
</html>
